services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: flocksense
      POSTGRES_PASSWORD: flocksense
      POSTGRES_DB: flocksense
    ports:
      - "5432:5432"
    volumes:
      - flocksense_db:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://flocksense:flocksense@db:5432/flocksense
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME:-flocksense-frames}
      R2_PUBLIC_BASE_URL: ${R2_PUBLIC_BASE_URL:-}
    depends_on:
      - db

volumes:
  flocksense_db:
